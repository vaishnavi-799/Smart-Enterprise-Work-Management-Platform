<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col md:flex-row">
    
    <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col justify-between shadow-sm">
        <div class="p-6">
            <div class="flex items-center gap-3 text-slate-900 mb-8">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fa-solid fa-layer-group"></i></div>
                <span class="font-bold text-lg tracking-wider">Grid</span>
            </div>
            
            <nav class="space-y-2">
                <button onclick="switchTab('tab-projects')" id="btn-tab-projects" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-slate-100 text-blue-600 transition">
                    <i class="fa-solid fa-folder-open w-5 text-blue-500"></i> Projects Portal
                </button>
                <button onclick="switchTab('tab-tasks')" id="btn-tab-tasks" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-list-check w-5 text-purple-500"></i> Task Matrix
                </button>
                <button onclick="switchTab('tab-teams')" id="btn-tab-teams" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-users w-5 text-emerald-500"></i> Collaboration Teams
                </button>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm text-white" id="user-avatar">U</div>
                <div class="truncate max-w-[120px]">
                    <p class="text-xs font-semibold text-slate-900 truncate" id="user-display-name">Active User</p>
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-mono">Enterprise</span>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500 p-2 rounded-lg transition">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 max-h-screen overflow-y-auto">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900" id="dashboard-title">Projects Portal</h1>
                <p class="text-slate-500 text-sm mt-1">Manage and track your platform assets dynamically.</p>
            </div>
            <div id="tab-action-container"></div>
        </header>

        <div id="tab-projects" class="tab-content space-y-6">
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-xs">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-500 bg-slate-50">
                                <th class="py-3.5 px-6">Project Name</th>
                                <th class="py-3.5 px-6">Priority</th>
                                <th class="py-3.5 px-6 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="projects-list-container" class="divide-y divide-slate-200 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="tasks-list-container"></div>
        </div>

        <div id="tab-teams" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="teams-list-container"></div>
        </div>
    </main>

    <div id="crud-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-xs p-4">
        <div class="bg-white border border-slate-200 rounded-xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-slate-900" id="modal-title">Management Engine</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="handleModalSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div id="modal-form-fields"></div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-lg transition">Cancel</button>
                    <button type="submit" class="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition">Save Entries</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Security Route Guard
        if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }

        let enterpriseState = {
            projects: JSON.parse(localStorage.getItem('crud_projects')) || [
                { id: 1, title: "Cloud Infrastructure Setup", priority: "Critical" },
                { id: 2, title: "Quantum Analytics Platform", priority: "High" }
            ],
            tasks: JSON.parse(localStorage.getItem('crud_tasks')) || [
                { id: 1, title: "Audit secure handshakes", assign: "Sarah Jenkins", status: "todo" },
                { id: 2, title: "Optimize Redis clusters", assign: "Alex Mercer", status: "progress" }
            ],
            teams: JSON.parse(localStorage.getItem('crud_teams')) || [
                { id: 1, name: "Core Architecture Unit", Lead: "Sarah Jenkins", focus: "Infrastructure" }
            ],
            currentActiveTab: "tab-projects"
        };

        function persistState() {
            localStorage.setItem('crud_projects', JSON.stringify(enterpriseState.projects));
            localStorage.setItem('crud_tasks', JSON.stringify(enterpriseState.tasks));
            localStorage.setItem('crud_teams', JSON.stringify(enterpriseState.teams));
        }

        function switchTab(tabId) {
            enterpriseState.currentActiveTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.className = "tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition");
            
            const activeBtn = document.getElementById(`btn-${tabId}`);
            let highlightClass = tabId === 'tab-projects' ? 'bg-blue-50 text-blue-600' : tabId === 'tab-tasks' ? 'bg-purple-50 text-purple-600' : 'bg-emerald-50 text-emerald-600';
            activeBtn.className = `tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium ${highlightClass} transition`;
            renderAppContent();
        }

        function renderAppContent() {
            const user = JSON.parse(localStorage.getItem('enterpriseUser')) || { name: "System Admin" };
            document.getElementById('user-display-name').innerText = user.name;
            document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();

            const actionContainer = document.getElementById('tab-action-container');
            const titleElement = document.getElementById('dashboard-title');

            if (enterpriseState.currentActiveTab === "tab-projects") {
                titleElement.innerText = "Projects Portal";
                actionContainer.innerHTML = `<button onclick="openModal('add')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center gap-2 transition"><i class="fa-solid fa-plus"></i> New Project</button>`;
                renderProjects();
            } else if (enterpriseState.currentActiveTab === "tab-tasks") {
                titleElement.innerText = "Task Matrix";
                actionContainer.innerHTML = `<button onclick="openModal('add')" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center gap-2 transition"><i class="fa-solid fa-plus"></i> Add Task</button>`;
                renderTasks();
            } else if (enterpriseState.currentActiveTab === "tab-teams") {
                titleElement.innerText = "Collaboration Teams";
                actionContainer.innerHTML = `<button onclick="openModal('add')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center gap-2 transition"><i class="fa-solid fa-plus"></i> Add Team</button>`;
                renderTeams();
            }
        }

        function renderProjects() {
            document.getElementById('projects-list-container').innerHTML = enterpriseState.projects.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="py-4 px-6 font-semibold text-slate-900">${p.title}</td>
                    <td class="py-4 px-6"><span class="px-2 py-1 text-xs rounded-md bg-slate-100 text-slate-700">${p.priority}</span></td>
                    <td class="py-4 px-6 text-right space-x-2">
                        <button onclick="openModal('edit', ${p.id})" class="text-blue-600 hover:text-blue-800 font-medium text-xs">Edit</button>
                        <button onclick="deleteItem(${p.id})" class="text-red-600 hover:text-red-800 font-medium text-xs">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderTasks() {
            const columns = { todo: [], progress: [], done: [] };
            enterpriseState.tasks.forEach(t => columns[t.status]?.push(t));
            const colNames = { todo: 'To-Do', progress: 'In Progress', done: 'Completed' };

            document.getElementById('tasks-list-container').innerHTML = ['todo', 'progress', 'done'].map(status => `
                <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-col min-h-[250px]">
                    <div class="flex justify-between border-b pb-2 mb-3"><span class="font-bold text-sm text-slate-700 uppercase">${colNames[status]}</span></div>
                    <div class="space-y-3 flex-1">
                        ${columns[status].map(t => `
                            <div class="bg-slate-50 border p-3 rounded-lg shadow-xs">
                                <p class="text-slate-900 font-medium text-sm">${t.title}</p>
                                <p class="text-xs text-slate-500 mt-1"><i class="fa-regular fa-user"></i> ${t.assign}</p>
                                <div class="mt-3 flex justify-end gap-2 text-xs">
                                    <button onclick="openModal('edit', ${t.id})" class="text-blue-600 hover:underline">Edit</button>
                                    <button onclick="deleteItem(${t.id})" class="text-red-600 hover:underline">Delete</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderTeams() {
            document.getElementById('teams-list-container').innerHTML = enterpriseState.teams.map(t => `
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-3">
                    <h4 class="text-base font-bold text-slate-900">${t.name}</h4>
                    <p class="text-slate-600 text-xs">Lead: <strong>${t.Lead}</strong> | Focus: <strong>${t.focus}</strong></p>
                    <div class="pt-2 border-t flex justify-end gap-3 text-xs">
                        <button onclick="openModal('edit', ${t.id})" class="text-blue-600 font-medium">Edit</button>
                        <button onclick="deleteItem(${t.id})" class="text-red-600 font-medium">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(mode, id = null) {
            const fields = document.getElementById('modal-form-fields');
            document.getElementById('edit-id').value = id || '';
            const isEdit = mode === 'edit';

            if (enterpriseState.currentActiveTab === "tab-projects") {
                const item = isEdit ? enterpriseState.projects.find(p => p.id === id) : { title: '', priority: 'Medium' };
                fields.innerHTML = `
                    <div><label class="block text-xs font-semibold mb-1">Project Title</label><input id="f-title" value="${item.title}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
                    <div class="mt-3"><label class="block text-xs font-semibold mb-1">Priority</label><select id="f-priority" class="w-full border rounded-lg px-3 py-2 text-sm"><option ${item.priority === 'Critical' ? 'selected' : ''}>Critical</option><option ${item.priority === 'High' ? 'selected' : ''}>High</option><option ${item.priority === 'Medium' ? 'selected' : ''}>Medium</option></select></div>`;
            } else if (enterpriseState.currentActiveTab === "tab-tasks") {
                const item = isEdit ? enterpriseState.tasks.find(t => t.id === id) : { title: '', assign: '', status: 'todo' };
                fields.innerHTML = `
                    <div><label class="block text-xs font-semibold mb-1">Task Name</label><input id="f-title" value="${item.title}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
                    <div class="mt-3"><label class="block text-xs font-semibold mb-1">Assignee</label><input id="f-assign" value="${item.assign}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
                    <div class="mt-3"><label class="block text-xs font-semibold mb-1">Status</label><select id="f-status" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="todo" ${item.status === 'todo' ? 'selected' : ''}>To-Do</option><option value="progress" ${item.status === 'progress' ? 'selected' : ''}>In Progress</option><option value="done" ${item.status === 'done' ? 'selected' : ''}>Completed</option></select></div>`;
            } else if (enterpriseState.currentActiveTab === "tab-teams") {
                const item = isEdit ? enterpriseState.teams.find(t => t.id === id) : { name: '', Lead: '', focus: '' };
                fields.innerHTML = `
                    <div><label class="block text-xs font-semibold mb-1">Team Name</label><input id="f-name" value="${item.name}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
                    <div class="mt-3"><label class="block text-xs font-semibold mb-1">Team Lead</label><input id="f-lead" value="${item.Lead}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
                    <div class="mt-3"><label class="block text-xs font-semibold mb-1">Focus Domain</label><input id="f-focus" value="${item.focus}" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>`;
            }
            document.getElementById('crud-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('crud-modal').classList.add('hidden'); }

        function handleModalSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const tab = enterpriseState.currentActiveTab;

            if (tab === "tab-projects") {
                const data = { title: document.getElementById('f-title').value, priority: document.getElementById('f-priority').value };
                if (id) Object.assign(enterpriseState.projects.find(p => p.id == id), data);
                else enterpriseState.projects.push({ id: Date.now(), ...data });
            } else if (tab === "tab-tasks") {
                const data = { title: document.getElementById('f-title').value, assign: document.getElementById('f-assign').value, status: document.getElementById('f-status').value };
                if (id) Object.assign(enterpriseState.tasks.find(t => t.id == id), data);
                else enterpriseState.tasks.push({ id: Date.now(), ...data });
            } else if (tab === "tab-teams") {
                const data = { name: document.getElementById('f-name').value, Lead: document.getElementById('f-lead').value, focus: document.getElementById('f-focus').value };
                if (id) Object.assign(enterpriseState.teams.find(t => t.id == id), data);
                else enterpriseState.teams.push({ id: Date.now(), ...data });
            }
            persistState(); closeModal(); renderAppContent();
        }

        function deleteItem(id) {
            const tab = enterpriseState.currentActiveTab;
            if (tab === "tab-projects") enterpriseState.projects = enterpriseState.projects.filter(p => p.id !== id);
            else if (tab === "tab-tasks") enterpriseState.tasks = enterpriseState.tasks.filter(t => t.id !== id);
            else if (tab === "tab-teams") enterpriseState.teams = enterpriseState.teams.filter(t => t.id !== id);
            persistState(); renderAppContent();
        }

        function logout() { localStorage.setItem('isLoggedIn', 'false'); window.location.href = 'login.html'; }
        renderAppContent();
    </script>
</body>
</html>
