<body class="bg-brandBg font-sans antialiased text-slate-800">

        <nav class="space-y-1">
          <a href="dashboard.html" class="flex items-center gap-3 px-3 py-3 rounded-xl transition hover:bg-white/5 text-sm font-medium">
            <i class="fa-solid fa-chart-pie w-5 text-center"></i>
            <span>Dashboard</span>
          </a>
          <a href="projects.html" class="flex items-center gap-3 px-3 py-3 rounded-xl transition hover:bg-white/5 text-sm font-medium">
            <i class="fa-solid fa-folder w-5 text-center"></i>
            <span>Projects</span>
          </a>
          <a href="tasks.html" class="flex items-center gap-3 px-3 py-3 rounded-xl transition hover:bg-white/5 text-sm font-medium">
            <i class="fa-solid fa-list-check w-5 text-center"></i>

          </a>
          <a href="task-details.html" class="flex items-center gap-3 px-3 py-3 rounded-xl transition hover:bg-white/5 text-sm font-medium">
            <i class="fa-solid fa-circle-info w-5 text-center"></i>
            <span>Task Details</span>
          </a>
          <a href="profile.html" class="flex items-center gap-3 px-3 py-3 rounded-xl bg-brandBlue text-white font-medium shadow-lg shadow-indigo-600/20 text-sm">
            <i class="fa-solid fa-user w-5 text-center"></i>
            <span>Profile</span>
          </a>
        </nav>
      </div>

      <a href="login.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:bg-red-900/20 hover:text-red-400 transition mb-4 text-sm font-medium">
        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
        <span>Logout</span>
      </a>
    </aside>

    <main class="flex-1 ml-64 p-10">
      
      <header class="flex justify-between items-center mb-10">
        <div>
          <h1 class="text-3xl font-bold text-textDark tracking-tight">Account Settings</h1>
          <p class="text-sm text-gray-500 mt-1">Manage your profile details, active teams, and project schedules.</p>
        </div>
        
        <div class="flex items-center gap-3 bg-white py-2 px-4 rounded-full shadow-sm border border-slate-100">
          <img 
            src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" 
            alt="Avatar" 
            class="w-8 h-8 rounded-full object-cover border border-indigo-100"
          >
          <div class="text-left">
            <p id="card-user-name" class="text-xs font-bold leading-3 text-slate-800"></p>
            <span class="text-[10px] text-slate-400 font-medium">Project Manager</span>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-white rounded-2xl border border-slate-100 p-6 shadow-sm flex flex-col items-center text-center self-start">
          <div class="relative group mb-4">
            <img 
              src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" 
              alt="Profile Big" 
              class="w-28 h-28 rounded-full object-cover ring-4 ring-slate-50 shadow-inner"
            >
            <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-xs font-medium cursor-pointer transition-all duration-200">
              Change Photo
            </div>
          </div>

          <h3 id="profile-name"></h3>
          <p class="text-sm text-indigo-600 font-medium tracking-wide mt-0.5">Project Manager</p>

          <hr class="w-full my-6 border-slate-100">

          <div class="w-full text-left">
            
            <div id="profile-view-mode" class="space-y-4">
              <div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 block mb-1">Email Address</span>
                <div class="flex items-center gap-2 text-slate-700 bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-100 text-sm">
                  <i class="fa-regular fa-envelope text-slate-400"></i>
                  <span id="display-email"></span>
                </div>
              </div>
              <div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 block mb-1">Assigned Team</span>
                <div class="flex items-center gap-2 text-slate-700 bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-100 text-sm">
                  <i class="fa-solid fa-users text-slate-400"></i>
                  <p id="user-role"></p>
                </div>
              </div>
              <button 
                id="btn-edit"
                class="w-full mt-2 flex items-center justify-center gap-2 bg-slate-900 text-white font-medium py-2.5 px-4 rounded-xl hover:bg-slate-800 transition text-sm shadow-sm"
              >
                <i class="fa-regular fa-pen-to-square text-xs"></i> Edit Identity
              </button>
            </div>

            <form id="profile-edit-mode" class="space-y-4 hidden">
              <div>
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400 block mb-1">Full Name</label>
                <input 
                  type="text" 
                  id="input-name"
                  class="w-full bg-white border-2 border-indigo-500 focus:outline-none px-3 py-2 rounded-xl text-sm font-medium text-slate-800"
                  required 
                >
              </div>
              <div>
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400 block mb-1">Email Address</label>
                <input 
                  type="email" 
                  id="input-email"
                  class="w-full bg-white border-2 border-indigo-500 focus:outline-none px-3 py-2 rounded-xl text-sm font-medium text-slate-800"
                  required 
                >
              </div>
              <div class="flex gap-2 pt-2">
                <button 
                  type="submit"
                  class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded-xl transition text-sm flex items-center justify-center gap-1 shadow-sm"
                >
                  <i class="fa-solid fa-check text-xs"></i> Save
                </button>
                <button 
                  type="button" 
                  id="btn-cancel"
                  class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2 rounded-xl transition text-sm flex items-center justify-center gap-1"
                >
                  <i class="fa-solid fa-xmark text-xs"></i> Cancel
                </button>
              </div>
            </form>

          </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
          
          
          
    <!-- MY PROJECTS -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">

        <div class="flex items-center gap-2 mb-4">

            <div class="p-1.5 bg-blue-50 text-blue-600 rounded-lg">
                <i class="fa-solid fa-briefcase"></i>
            </div>

            <h4 class="text-lg font-bold text-slate-800">
                My Projects
            </h4>

        </div>


        <div id="projects-container" class="space-y-3">

        </div>

    </div>




    <!-- APPROACHING DEADLINES -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">

        <div class="flex items-center gap-2 mb-4">

            <div class="p-1.5 bg-amber-50 text-amber-600 rounded-lg">

                <i class="fa-regular fa-calendar-days"></i>

            </div>


            <h4 class="text-lg font-bold text-slate-800">
                Approaching Deadlines
            </h4>

        </div>



        <div id="deadline-container" class="space-y-3">

        </div>


    </div>





    <!-- ACTIVE TASK BOARD -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">


        <div class="flex items-center gap-2 mb-4">


            <div class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg">

                <i class="fa-regular fa-square-check"></i>

            </div>


            <h4 class="text-lg font-bold text-slate-800">
                Active Task Board
            </h4>


        </div>




        <div id="task-board-container" class="space-y-3">

        </div>


    </div>




        </div>
      </div>
    </main>
  </div>

 <script>

const API_URL = "http://localhost:5000/api";


// ======================================
// LOAD USER PROFILE
// ======================================

async function loadProfile(){

    const token = localStorage.getItem("token");


    if(!token){

        window.location.href="login.html";
        return;

    }


    try{


        const response = await fetch(
            `${API_URL}/users/profile`,
            {
                headers:{
                    "Authorization":`Bearer ${token}`,
                    "Content-Type":"application/json"
                }
            }
        );



        const data = await response.json();


        console.log("Profile Data:",data);



        if(!response.ok){

            throw new Error(data.message);

        }



        const user = data.user;



        document.getElementById(
            "card-user-name"
        ).innerText = user.name;



        document.getElementById(
            "profile-name"
        ).innerText = user.name;



        document.getElementById(
            "display-email"
        ).innerText = user.email;



        document.getElementById(
            "user-role"
        ).innerText = user.role || "Member";



    }
    catch(error){

        console.log(
            "Profile Error:",
            error
        );

    }

}





// ======================================
// LOAD PROJECTS AND TASKS
// ======================================


async function loadProfileData(){


    const token = localStorage.getItem("token");


    const headers={

        "Authorization":
        `Bearer ${token}`,

        "Content-Type":
        "application/json"

    };



    try{


        // ==========================
        // PROJECTS
        // ==========================


        const projectResponse =
        await fetch(

            `${API_URL}/projects`,

            {
                headers
            }

        );



        const projects =
        await projectResponse.json();



        console.log(
            "Projects:",
            projects
        );



        const projectContainer =
        document.getElementById(
            "projects-container"
        );



        projectContainer.innerHTML="";



        if(projects.length===0){


            projectContainer.innerHTML=
            `

            <p class="text-gray-400 text-sm">
            No projects assigned
            </p>

            `;


        }
        else{


            projects.forEach(project=>{


                projectContainer.innerHTML +=


                `

                <div class="flex items-center justify-between border border-slate-100 p-4 rounded-xl bg-slate-50/50">


                    <div>

                        <h5 class="font-semibold text-slate-800 text-sm">

                        ${project.name}

                        </h5>


                        <p class="text-xs text-slate-400">

                        Role:
                        ${project.role || "Member"}

                        </p>


                    </div>



                    <span class="bg-blue-50 border border-blue-200 text-blue-600 px-3 py-1 rounded-full text-xs">


                    ${project.status || "In Progress"}


                    </span>



                </div>


                `;


            });


        }








        // ==========================
        // TASKS
        // ==========================



        const taskResponse =
        await fetch(

            `${API_URL}/tasks`,

            {
                headers
            }

        );



        const tasks =
        await taskResponse.json();



        console.log(
            "Tasks:",
            tasks
        );



        const taskContainer =
        document.getElementById(
            "task-board-container"
        );



        taskContainer.innerHTML="";




        if(tasks.length===0){


            taskContainer.innerHTML=
            `

            <p class="text-gray-400 text-sm">
            No active tasks
            </p>

            `;


        }
        else{


            tasks.forEach(task=>{


                taskContainer.innerHTML +=


                `

                <div class="flex items-center justify-between border border-slate-100 p-4 rounded-xl">


                    <div class="flex items-center gap-3">


                        <input 
                        type="checkbox"
                        ${task.status==="Completed"?"checked":""}
                        disabled
                        >



                        <span class="text-sm font-medium">

                        ${task.title}

                        </span>


                    </div>




                    <span class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-md">


                    ${task.status}


                    </span>



                </div>


                `;



            });



        }








        // ==========================
        // DEADLINES
        // ==========================



        const deadlineContainer =
        document.getElementById(
            "deadline-container"
        );



        deadlineContainer.innerHTML="";



        const deadlineTasks =
        tasks.filter(
            task=>task.dueDate
        );



        if(deadlineTasks.length===0){


            deadlineContainer.innerHTML=

            `

            <p class="text-gray-400 text-sm">

            No upcoming deadlines

            </p>

            `;


        }
        else{


            deadlineTasks.forEach(task=>{


                deadlineContainer.innerHTML +=


                `

                <div class="border border-slate-100 p-4 rounded-xl bg-slate-50/50">


                    <h5 class="font-semibold text-slate-800 text-sm">

                    ${task.title}

                    </h5>



                    <p class="text-xs text-slate-400 mt-1">

                    Target:
                    ${formatDate(task.dueDate)}

                    </p>



                    <span class="text-xs text-red-600">

                    ${task.priority}

                    </span>



                </div>


                `;


            });



        }





    }
    catch(error){


        console.log(
            "Loading Error:",
            error
        );


    }



}







// ======================================
// DATE FORMAT
// ======================================


function formatDate(date){


    if(!date)
    return "";



    return new Date(date)
    .toLocaleDateString(

        "en-US",

        {

            day:"2-digit",

            month:"short",

            year:"numeric"

        }

    );


}






// ======================================
// LOGOUT
// ======================================


function logout(){


    localStorage.removeItem("token");

    localStorage.removeItem("user");


    window.location.href="login.html";


}







// ======================================
// PAGE LOAD
// ======================================


window.onload = async()=>{


    await loadProfile();


    await loadProfileData();


};



</script>




</body>
</html>
