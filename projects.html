<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col md:flex-row">
    
    <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col justify-between shadow-sm">
        <div class="p-6">
            <div class="flex items-center gap-3 text-slate-900 mb-8">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fa-solid fa-layer-group"></i></div>
                <span class="font-bold text-lg tracking-wider">Grid</span>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-users w-5 text-emerald-500"></i> Collaboration Teams
                </a>
                <a href="projects.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-blue-50 text-blue-600 transition">
                    <i class="fa-solid fa-folder-open w-5 text-blue-500"></i> Projects Portal
                </a>
                <a href="tasks.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-list-check w-5 text-purple-500"></i> Task Matrix
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm text-white">D</div>
                <div class="truncate max-w-[120px]">
                    <p class="text-xs font-semibold text-slate-900 truncate">Developer Guest</p>
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-mono">Enterprise</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 max-h-screen overflow-y-auto">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Projects Portal</h1>
                <p class="text-slate-500 text-sm mt-1">Manage and track your platform assets dynamically.</p>
            </div>
            <button onclick="openModal('add')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center gap-2 transition">
                <i class="fa-solid fa-plus"></i> New Project
            </button>
        </header>

        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-500 bg-slate-50">
                            <th class="py-3.5 px-6">Project Name</th>
                            <th class="py-3.5 px-6">Priority Level</th>
                            <th class="py-3.5 px-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projects-list-container" class="divide-y divide-slate-200 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="crud-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
        <div class="bg-white border border-slate-200 rounded-xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-slate-900">Project Scope</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="handleModalSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-600">Project Title</label>
                    <input id="f-title" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-600">Priority Level</label>
                    <select id="f-priority" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-blue-500">
                        <option>Critical</option>
                        <option>High</option>
                        <option>Medium</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('crud_projects')) || [
            { id: 1, title: "Cloud Infrastructure Setup", priority: "Critical" },
            { id: 2, title: "Quantum Analytics Platform", priority: "High" }
        ];

        function renderProjects() {
            const container = document.getElementById('projects-list-container');
            if(!container) return;
            container.innerHTML = projects.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="py-4 px-6 font-semibold text-slate-900">${p.title}</td>
                    <td class="py-4 px-6"><span class="px-2 py-1 text-xs rounded bg-slate-100 text-slate-700 font-medium">${p.priority}</span></td>
                    <td class="py-4 px-6 text-right space-x-2">
                        <button onclick="openModal('edit', ${p.id})" class="text-blue-600 hover:underline text-xs">Edit</button>
                        <button onclick="deleteProject(${p.id})" class="text-red-600 hover:underline text-xs">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(mode, id = null) {
            document.getElementById('edit-id').value = id || '';
            if (mode === 'edit') {
                const p = projects.find(item => item.id === id);
                document.getElementById('f-title').value = p.title;
                document.getElementById('f-priority').value = p.priority || 'Medium';
            } else {
                document.getElementById('f-title').value = '';
                document.getElementById('f-priority').value = 'Medium';
            }
            document.getElementById('crud-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('crud-modal').classList.add('hidden'); }

        function handleModalSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('f-title').value,
                priority: document.getElementById('f-priority').value
            };
            if (id) {
                Object.assign(projects.find(p => p.id == id), data);
            } else {
                projects.push({ id: Date.now(), ...data });
            }
            localStorage.setItem('crud_projects', JSON.stringify(projects));
            closeModal();
            renderProjects();
        }

        function deleteProject(id) {
            projects = projects.filter(p => p.id !== id);
            localStorage.setItem('crud_projects', JSON.stringify(projects));
            renderProjects();
        }

        window.onload = renderProjects;
    </script>
</body>
</html>
