<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md space-y-8 bg-white p-8 rounded-xl shadow-xl border border-slate-200">
        <div class="text-center">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 text-emerald-600 text-2xl">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="mt-6 text-3xl font-bold tracking-tight text-slate-900">Sign In</h2>
            <p class="mt-2 text-sm text-slate-500">Access your workspace credentials</p>
        </div>
        
        <form class="mt-8 space-y-6" onsubmit="handleLogin(event)">
            <div class="space-y-4 rounded-md">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
                    <input id="login-email" type="email" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-900 placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                    <input id="login-password" type="password" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-900 placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full rounded-lg bg-emerald-600 py-3 text-sm font-semibold text-white hover:bg-emerald-700 transition duration-200 shadow-lg shadow-emerald-600/10">Authorize & Enter</button>
        </form>
        <p class="text-center text-sm text-slate-500">New deployment? <a href="register.html" class="font-medium text-emerald-600 hover:text-emerald-700">Create an account</a></p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const emailInput = document.getElementById('login-email').value;
            const passwordInput = document.getElementById('login-password').value;
            
            const savedUser = JSON.parse(localStorage.getItem('enterpriseUser'));

            // Check matching data state
            if (savedUser && savedUser.email === emailInput && savedUser.password === passwordInput) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert("Error: Invalid Email or Password configuration.");
            }
        }
    </script>
</body>
</html>
