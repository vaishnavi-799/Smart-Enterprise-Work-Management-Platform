<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col md:flex-row">
    
    <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col justify-between shadow-sm">
        <div class="p-6">
            <div class="flex items-center gap-3 text-slate-900 mb-8">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fa-solid fa-layer-group"></i></div>
                <span class="font-bold text-lg tracking-wider">Grid</span>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-users w-5 text-emerald-500"></i> Collaboration Teams
                </a>
                <a href="projects.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition">
                    <i class="fa-solid fa-folder-open w-5 text-blue-500"></i> Projects Portal
                </a>
                <a href="tasks.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-purple-50 text-purple-600 transition">
                    <i class="fa-solid fa-list-check w-5 text-purple-500"></i> Task Matrix
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm text-white">D</div>
                <div class="truncate max-w-[120px]">
                    <p class="text-xs font-semibold text-slate-900 truncate">Developer Guest</p>
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-mono">Enterprise</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 max-h-screen overflow-y-auto">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Task Matrix</h1>
                <p class="text-slate-500 text-sm mt-1">Manage pipeline assignments and workflows cleanly.</p>
            </div>
            <button onclick="openModal('add')" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center gap-2 transition">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="tasks-list-container"></div>
    </main>

    <div id="crud-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
        <div class="bg-white border border-slate-200 rounded-xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-slate-900">Task Settings</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="handleModalSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-600">Task Summary</label>
                    <input id="f-title" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-600">Assignee</label>
                    <input id="f-assign" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-600">Status Lane</label>
                    <select id="f-status" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-purple-500">
                        <option value="todo">To-Do</option>
                        <option value="progress">In Progress</option>
                        <option value="done">Completed</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 text-sm font-semibold text-white bg-purple-600 hover:bg-purple-700 rounded-lg">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('crud_tasks')) || [
            { id: 1, title: "Audit secure handshakes", assign: "Sarah Jenkins", status: "todo" },
            { id: 2, title: "Optimize Redis clusters", assign: "Alex Mercer", status: "progress" }
        ];

        function renderTasks() {
            const container = document.getElementById('tasks-list-container');
            if(!container) return;

            const columns = { todo: [], progress: [], done: [] };
            tasks.forEach(t => columns[t.status]?.push(t));

            const colNames = { todo: 'To-Do', progress: 'In Progress', done: 'Completed' };
            const colColors = { todo: 'border-t-slate-400', progress: 'border-t-amber-500', done: 'border-t-emerald-500' };

            container.innerHTML = ['todo', 'progress', 'done'].map(status => `
                <div class="bg-white border-t-4 ${colColors[status]} rounded-b-xl p-4 flex flex-col min-h-[350px] border border-slate-200">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-slate-200">
                        <span class="font-bold text-sm text-slate-700 uppercase">${colNames[status]}</span>
                        <span class="text-xs bg-slate-100 px-2 py-0.5 rounded-full font-bold">${columns[status].length}</span>
                    </div>
                    <div class="space-y-3 flex-1">
                        ${columns[status].map(t => `
                            <div class="bg-slate-50 border border-slate-200 p-4 rounded-xl shadow-xs space-y-2">
                                <h4 class="text-sm font-bold text-slate-900">${t.title}</h4>
                                <p class="text-xs text-slate-500"><i class="fa-regular fa-user mr-1"></i> ${t.assign}</p>
                                <div class="flex items-center justify-between pt-2 border-t border-slate-200 mt-2">
                                    <select onchange="changeStatus(${t.id}, this.value)" class="text-xs border border-slate-200 rounded bg-white px-1 py-0.5 cursor-pointer focus:outline-none">
                                        <option value="todo" ${t.status === 'todo' ? 'selected' : ''}>To-Do</option>
                                        <option value="progress" ${t.status === 'progress' ? 'selected' : ''}>In Progress</option>
                                        <option value="done" ${t.status === 'done' ? 'selected' : ''}>Done</option>
                                    </select>
                                    <div class="space-x-2">
                                        <button onclick="openModal('edit', ${t.id})" class="text-blue-600 hover:underline text-xs">Edit</button>
                                        <button onclick="deleteTask(${t.id})" class="text-red-600 hover:underline text-xs">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function changeStatus(id, nextStatus) {
            tasks.find(t => t.id === id).status = nextStatus;
            localStorage.setItem('crud_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function openModal(mode, id = null) {
            document.getElementById('edit-id').value = id || '';
            if (mode === 'edit') {
                const t = tasks.find(item => item.id === id);
                document.getElementById('f-title').value = t.title;
                document.getElementById('f-assign').value = t.assign;
                document.getElementById('f-status').value = t.status;
            } else {
                document.getElementById('f-title').value = '';
                document.getElementById('f-assign').value = '';
                document.getElementById('f-status').value = 'todo';
            }
            document.getElementById('crud-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('crud-modal').classList.add('hidden'); }

        function handleModalSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('f-title').value,
                assign: document.getElementById('f-assign').value,
                status: document.getElementById('f-status').value
            };
            if (id) {
                Object.assign(tasks.find(t => t.id == id), data);
            } else {
                tasks.push({ id: Date.now(), ...data });
            }
            localStorage.setItem('crud_tasks', JSON.stringify(tasks));
            closeModal();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('crud_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        window.onload = renderTasks;
    </script>
</body>
</html>
